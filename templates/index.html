<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Input Form</title>

</head>
<body>

<div class="form-container">
    <h2>Send Email Body</h2>

    <!-- HTML Form submitting via POST -->
    <form action="/submit-email" method="post">
        <div class="form-group">
            <label for="email_body">Type your Email Body here:</label>
            <!-- The 'name' attribute is what FastAPI reads -->
            <textarea id="email_body" name="email_body" placeholder="Write your email content..."></textarea>
        </div>
        <button type="submit">Submit Body</button>
    </form>

    <!-- Display success message if variables exist -->
    {% if result %}
        <p><strong>Email is:</strong> {{ result }}</p>
    {% endif %}
</div>

</body>
</html>
